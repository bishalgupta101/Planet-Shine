<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="pg" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#0f6b50"/>
      <stop offset="100%" stop-color="#06352a"/>
    </radialGradient>
    <radialGradient id="sg" cx="28%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#9FE1CB"/>
      <stop offset="100%" stop-color="#5DCAA5"/>
    </radialGradient>
  </defs>

  <!-- Dark rounded square background -->
  <rect width="64" height="64" rx="13" fill="#06352a"/>

  <!-- MARK centred at (32,32) -->
  <g transform="translate(32,32)">
    <circle cx="0" cy="0" r="14" fill="url(#pg)"/>
    <!-- P stem -->
    <rect x="-14" y="-9.5" width="3.5" height="19" rx="1" fill="#5DCAA5" opacity="0.55"/>
    <!-- P bowl -->
    <path d="M0,0 C0,-7.5 8,-7.5 8,-2.5 C8,2.5 0,2.5 0,0 Z" fill="#5DCAA5" opacity="0.38"/>
    <!-- Orbit ring -->
    <ellipse cx="0" cy="0" rx="21" ry="8" fill="none" stroke="#5DCAA5" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Back-half masked -->
    <path d="M-21,0 A21,8 0 0,1 21,0" fill="none" stroke="#06352a" stroke-width="2.2"/>
    <!-- Shine sphere -->
    <circle cx="13" cy="-11" r="4.5" fill="url(#sg)"/>
    <circle cx="12" cy="-12.5" r="1.6" fill="#ffffff" opacity="0.75"/>
    <!-- Rays -->
    <line x1="18.5" y1="-11" x2="24" y2="-11" stroke="#9FE1CB" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="13" y1="-17" x2="13" y2="-22" stroke="#9FE1CB" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="17" y1="-15" x2="21" y2="-19" stroke="#9FE1CB" stroke-width="1.1" stroke-linecap="round"/>
  </g>
</svg>
